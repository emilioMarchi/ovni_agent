server {
    listen 80 default_server;
    server_name api.ovnistudio.com.ar 64.23.133.61;

    root /var/www/ovni_agent/public;
    index index.html;

    # 1. ESTO ES LO QUE FALTA: Prioridad para el reto de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/ovni_agent/public;
        allow all;
    }

    # Raíz
    location = / {
        try_files $uri $uri/ =404;
    }

    # Archivos estáticos del panel
    location ~* ^/(master-admin\.html|ovni-loader\.js|widget\.html)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # API y todo lo demás → Node.js
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }
}
