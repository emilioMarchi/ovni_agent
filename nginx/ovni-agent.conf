server {
    listen 80;
    server_name de.ovnistudio.com.ar;

    # Redirigir todo HTTP a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name de.ovnistudio.com.ar;

    ssl_certificate     /etc/letsencrypt/live/de.ovnistudio.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/de.ovnistudio.com.ar/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Límites de request
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Para streaming/SSE (tu endpoint /api/chat/stream)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }
}
