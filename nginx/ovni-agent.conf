server {
    listen 80;
    server_name api.ovnistudio.com.ar;

    # Redirigir todo HTTP a HTTPS después de emitir el SSL
    # return 301 https://$host$request_uri;

    # Raíz → panel admin
    location = / {
        return 302 /master-admin.html;
    }

    # Archivos estáticos del panel
    location ~* ^/(master-admin\.html|ovni-loader\.js|widget\.html)$ {
        root /root/ovni_agent/public;
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # API y todo lo demás → Node.js
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Para streaming/SSE
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }
}