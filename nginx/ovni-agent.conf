# 1. Bloque HTTPS (El que responde al dominio con candadito)
server {
    listen 443 ssl;
    server_name api.ovnistudio.com.ar;

    # Directorio de tus archivos
    root /var/www/ovni_agent/public;
    index master-admin.html index.html;

    # === CONFIGURACION SSL (Verifica que estas rutas sean las tuyas) ===
    ssl_certificate /etc/letsencrypt/live/api.ovnistudio.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ovnistudio.com.ar/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    # =================================================================

    # Intentar servir el archivo directo, si no existe buscar .html, si no, ir a Node
    location / {
        try_files $uri $uri/ $uri.html @node_api;
    }

    # Optimización para archivos estáticos y permitir carga desde otros sitios (CORS)
    location ~* \.(html|js|css|png|ico|svg)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, no-transform";
        add_header Access-Control-Allow-Origin "*"; 
    }

    # Proxy hacia tu App de Node.js (Puerto 8080)
    location @node_api {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Necesario para el streaming de respuestas de la IA
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }
}

# 2. Bloque HTTP e IP (Redirección automática a HTTPS)
server {
    listen 80 default_server;
    server_name api.ovnistudio.com.ar 64.23.133.61;

    # Permitir renovaciones de Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/ovni_agent/public;
    }

    # Redirigir todo lo demás a HTTPS con el dominio
    location / {
        return 301 https://api.ovnistudio.com.ar$request_uri;
    }
}
